<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>设置 · 词卡</title>
<link rel="stylesheet" href="assets/css/cards.css">
</head>
<body>
<div class="shell">
  <header class="topbar">
    <h1>设置</h1>
    <div class="links">
      <span id="acctChip" class="account-chip"></span>
      <a href="index.html">← 返回</a>
    </div>
  </header>

  <div id="okBox" class="ok-box hidden"></div>

  <section class="auth-card">
    <h2 class="auth-title">学习设置</h2>

    <form id="settingsForm">
      <div class="field">
        <span>展示新词时自动播放发音</span>
        <div class="radio-group" id="autoPlayGroup">
          <label class="radio-row">
            <input type="radio" name="autoPlayAudio" value="off">
            <span><strong>关闭</strong> · 仅手动点 🔊 时播放（默认）</span>
          </label>
          <label class="radio-row">
            <input type="radio" name="autoPlayAudio" value="new">
            <span><strong>仅新词</strong> · 第一次见到的词自动读一遍</span>
          </label>
          <label class="radio-row">
            <input type="radio" name="autoPlayAudio" value="all">
            <span><strong>新词与复习</strong> · 每张卡都自动读</span>
          </label>
        </div>
        <div class="muted small" style="margin-top:6px;">
          需要浏览器支持 Web Speech；不支持时按钮置灰，自动播放也会跳过。
        </div>
        <div class="field" style="margin-top:10px;">
          <button type="button" class="primary-btn small" id="testBtn">🔊 测试发音 ("hello")</button>
          <span id="testStatus" class="muted small" style="margin-left:8px;"></span>
        </div>
      </div>

      <hr style="border:0; border-top:1px solid var(--border); margin:18px 0;">

      <div class="field">
        <span>⚡ 测试加速（仅用于演示 / 调试 SRS 排程）</span>
        <div class="radio-group" id="testScaleGroup">
          <label class="radio-row">
            <input type="radio" name="testTimeScale" value="1">
            <span><strong>1×</strong> · 正常（默认）· 间隔按真实天数计</span>
          </label>
          <label class="radio-row">
            <input type="radio" name="testTimeScale" value="24">
            <span><strong>24×</strong> · 加速 · 24 小时 → 1 小时, 5 分钟 Again → ~12 秒</span>
          </label>
        </div>
        <div class="muted small" style="margin-top:6px;">
          切换只影响之后生成的到期时间;已排好的卡不会重算。每日新词 / 复习上限也随加速比按小时刷新。
        </div>
      </div>

      <hr style="border:0; border-top:1px solid var(--border); margin:18px 0;">

      <button type="submit" class="primary-btn">保存设置</button>
    </form>
  </section>

  <section class="auth-card">
    <h2 class="auth-title">关于本机账号</h2>
    <p class="muted small">设置按账号本机保存。导出 JSON 时会一起备份。</p>
    <div id="accountInfo" class="muted small"></div>
  </section>
</div>

<script type="module">
import * as auth from "./assets/js/auth.js";
import * as storage from "./assets/js/storage.js";
import * as tts from "./assets/js/tts.js";

const me = auth.requireAuth();
if (!me) {
  location.href = "login.html";
  throw new Error("redirecting to login");
}

document.getElementById("acctChip").innerHTML =
  `${escapeHtml(me.name)} · <a href="#" id="logoutLink">切换</a>`;
document.getElementById("logoutLink").addEventListener("click", (e) => {
  e.preventDefault();
  auth.logout();
  location.href = "login.html";
});

document.getElementById("accountInfo").innerHTML =
  `账号：<strong>${escapeHtml(me.name)}</strong>` +
  (me.hint ? ` · 口令提示：${escapeHtml(me.hint)}` : "") +
  ` · 创建于 ${me.createdAt ? me.createdAt.slice(0, 10) : "—"}`;

// Load current settings into form
const settings = storage.applySettings();
for (const r of document.querySelectorAll('[name=autoPlayAudio]')) {
  r.checked = (r.value === settings.autoPlayAudio);
}
const currentScale = String(settings.testTimeScale || 1);
for (const r of document.querySelectorAll('[name=testTimeScale]')) {
  r.checked = (r.value === currentScale);
}
// Fallback: if saved scale isn't one of the offered options, default to 1×
if (!document.querySelector('[name=testTimeScale]:checked')) {
  document.querySelector('[name=testTimeScale][value="1"]').checked = true;
}

// Test button
document.getElementById("testBtn").addEventListener("click", () => {
  const status = document.getElementById("testStatus");
  if (!tts.isAvailable()) {
    status.textContent = "本浏览器不支持 Web Speech";
    return;
  }
  const ok = tts.speak("hello");
  status.textContent = ok ? "已播放 ✓" : "播放失败";
});

// Save
document.getElementById("settingsForm").addEventListener("submit", (e) => {
  e.preventDefault();
  const choice = document.querySelector('[name=autoPlayAudio]:checked')?.value || "off";
  const scaleChoice = Number(document.querySelector('[name=testTimeScale]:checked')?.value || 1);
  storage.saveSettings({ autoPlayAudio: choice, testTimeScale: scaleChoice });
  const ok = document.getElementById("okBox");
  const scaleLabel = scaleChoice > 1 ? `,测试加速 ${scaleChoice}×` : "";
  ok.textContent = `设置已保存（自动播放：${
    {off:"关闭", new:"仅新词", all:"新词与复习"}[choice]
  }${scaleLabel}）`;
  ok.classList.remove("hidden");
});

function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, (c) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
  }[c]));
}
</script>
</body>
</html>
